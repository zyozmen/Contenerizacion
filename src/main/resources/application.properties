# ============================================================
# Configuración del Servidor
# ============================================================
server.port=8080

# ============================================================
# Metadata de la API (OpenAPI / Swagger)
# ============================================================
api.info.title=Products API
api.info.description=Microservicio CRUD de Productos construido con Spring Boot 3, Java 21 y MySQL. Arquitectura Hexagonal
api.info.version=0.0.1-SNAPSHOT
api.info.contact.name=Nelson Parra - 1010205795
api.info.contact.email=njaparrah@poligran.edu.co
api.info.contact.url=https://github.com/zyozmen/Products
api.info.license.name=MIT License
api.info.license.url=https://opensource.org/licenses/MIT
api.info.resilience.enabled=true
api.info.resilience.methods=Circuit Breaker, Retry

# Ruta de la UI de Swagger
springdoc.swagger-ui.path=/swagger-ui.html
# Ruta del JSON de la especificación OpenAPI
springdoc.api-docs.path=/v3/api-docs

# ============================================================
# Configuración de Base de Datos MySQL
# ============================================================

spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:products_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:USR_PRD_1}
spring.datasource.password=${DB_PASSWORD:USR_PSW_SCTR}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# Configuración de JPA / Hibernate
# ============================================================

spring.jpa.hibernate.ddl-auto=update

# se evita que se muestren las consultas SQL en la consola para no saturar los logs
spring.jpa.show-sql=false

# Formatea el SQL para que sea más legible en los logs
spring.jpa.properties.hibernate.format_sql=true

# Dialecto específico de MySQL 8 para que Hibernate genere SQL optimizado
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Nombre de la base de datos al que Hibernate mapeará las entidades
spring.jpa.properties.hibernate.default_schema=products_db

# ============================================================
# Configuración de Springdoc OpenAPI (Swagger UI)
# ============================================================
# Ruta de acceso a la interfaz gráfica de Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# Ordena los endpoints en la UI por método HTTP
springdoc.swagger-ui.operationsSorter=method

# ============================================================
# Información de la Aplicación (aparece en Swagger UI)
# ============================================================
spring.application.name=products-api

# ============================================================
# Resilience4j - Circuit Breaker (productoRepository)
# ============================================================
# Ventana deslizante de 10 llamadas para calcular la tasa de fallos
resilience4j.circuitbreaker.instances.productoRepository.sliding-window-size=10
# Abre el circuito cuando el 50% de las llamadas fallan
resilience4j.circuitbreaker.instances.productoRepository.failure-rate-threshold=50
# Espera 30 segundos en estado OPEN antes de intentar HALF-OPEN
resilience4j.circuitbreaker.instances.productoRepository.wait-duration-in-open-state=30s
# Permite 3 llamadas de prueba en estado HALF-OPEN
resilience4j.circuitbreaker.instances.productoRepository.permitted-number-of-calls-in-half-open-state=3
# Transición automática de OPEN a HALF-OPEN sin necesidad de una llamada entrante
resilience4j.circuitbreaker.instances.productoRepository.automatic-transition-from-open-to-half-open-enabled=true
# ResourceNotFoundException no cuenta como fallo: es un error de negocio, no de infraestructura
resilience4j.circuitbreaker.instances.productoRepository.ignore-exceptions=com.zyozmen.products.domain.exception.ResourceNotFoundException

# ============================================================
# Resilience4j - Retry (productoRepository)
# ============================================================
# Máximo 3 intentos antes de propagar la excepción
resilience4j.retry.instances.productoRepository.max-attempts=3
# Espera 500ms entre cada reintento
resilience4j.retry.instances.productoRepository.wait-duration=500ms
# Solo reintentar en errores transitorios de base de datos o de red
resilience4j.retry.instances.productoRepository.retry-exceptions=\
  org.springframework.dao.TransientDataAccessException,\
  org.springframework.dao.QueryTimeoutException,\
  java.net.ConnectException

# ============================================================
# Actuator - Endpoints de salud, métricas y estado de circuit breakers
# ============================================================
management.endpoints.web.exposure.include=health,info,circuitbreakers,retries
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true


# ============================================================
# GraphQL - configuracion para habilitar GraphiQL y definir la ruta de acceso a GraphQL
# ============================================================
spring.graphql.path=/graphql
spring.graphql.graphiql.enabled=true
